name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build distributable zip
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/wp-monitor-agent

          rsync -a ./ dist/wp-monitor-agent/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'dist' \
            --exclude '.DS_Store'

          cd dist
          zip -r wp-monitor-agent.zip wp-monitor-agent

      - name: Publish GitHub release with asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/wp-monitor-agent.zip
